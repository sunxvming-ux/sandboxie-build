name: Build Sandboxie x64

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  Build_x64_Qt6:
    runs-on: windows-2022
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup msbuild
        uses: microsoft/setup-msbuild@v2

      # ── Core Sandboxie (Win32 DLLs + x64 all + x64 driver) ──────────────

      - name: Build Sandboxie x86 (DLLs & svc)
        run: msbuild /t:build Sandboxie\SandboxDll.sln /p:Configuration="SbieRelease" /p:Platform=Win32 -maxcpucount:8

      - name: Build Sandboxie x64 (all)
        run: msbuild /t:build Sandboxie\Sandbox.sln /p:Configuration="SbieRelease" /p:Platform=x64 -maxcpucount:8

      - name: Build Sandboxie x64 (drv)
        run: msbuild /t:build Sandboxie\SandboxDrv.sln /p:Configuration="SbieRelease" /p:Platform=x64 -maxcpucount:8

      # ── Qt 6 (downloaded from xanasoft/qt-builds releases) ───────────────

      - name: Install Qt6 x64
        shell: cmd
        run: SandboxiePlus\install_qt.cmd x64 build_qt6

      - name: Install Jom
        shell: cmd
        run: SandboxiePlus\install_jom.cmd

      # ── SandboxiePlus (qmake) ────────────────────────────────────────────

      - name: Build Sandboxie-Plus x64
        shell: cmd
        run: SandboxiePlus\qmake_plus.cmd x64 build_qt6

      - name: Build SbieShell x64
        run: msbuild /t:restore,build -p:RestorePackagesConfig=true SandboxiePlus\SbieShell\SbieShell.sln /p:Configuration="Release" /p:Platform=x64

      # ── SandboxieTools ───────────────────────────────────────────────────

      - name: Build Sandboxie-Tools x64
        run: msbuild /t:build SandboxieTools\SandboxieTools.sln /p:Configuration="Release" /p:Platform=x64 -maxcpucount:8

      # ── Package ──────────────────────────────────────────────────────────

      - name: Add missing Qt languages
        shell: cmd
        run: Installer\fix_qt5_languages.cmd x64 build_qt6

      - name: Get OpenSSL binaries
        shell: cmd
        run: Installer\get_openssl.cmd

      - name: Get 7-Zip binaries
        shell: cmd
        run: Installer\get_7zip.cmd

      - name: Merge build
        shell: cmd
        run: Installer\copy_build.cmd x64 build_qt6

      - name: Collect installer assets
        shell: cmd
        run: Installer\get_assets.cmd

      - name: Bundle add-ons for offline use
        shell: pwsh
        run: |
          $updateUrl = "https://sandboxie-plus.com/update.php?action=update&software=sandboxie-plus&version=5.72.5&system=windows-10.0.22000-x64&language=en_US&channel=stable&auto=0"
          $root = "Installer\SbiePlus_x64"
          $addonsRoot = Join-Path $root "addons"
          $r = Invoke-RestMethod -Uri $updateUrl -TimeoutSec 30
          if (-not $r.addons) { throw "No add-on metadata returned" }

          New-Item -ItemType Directory -Force -Path $addonsRoot | Out-Null
          $r.addons | ConvertTo-Json -Depth 20 | Set-Content (Join-Path $root "addons.json") -Encoding UTF8

          $downloaded = 0
          foreach ($addon in @($r.addons.list)) {
            $addonId = $addon.id
            if (-not $addonId) { continue }

            $fileProps = @($addon.PSObject.Properties | Where-Object {
              $_.Name -match '^files($|-)' -and $_.Name -notmatch '-sig$'
            })
            $selected = @($fileProps | Where-Object { $_.Name -like 'files-qt*_x64' })
            if (-not $selected) { $selected = @($fileProps | Where-Object { $_.Name -eq 'files-x64' }) }
            if (-not $selected) { $selected = @($fileProps | Where-Object { $_.Name -eq 'files' }) }
            if (-not $selected) { continue }

            foreach ($file in @($selected[0].Value)) {
              if (-not $file.path -or -not $file.url) { continue }
              $outFile = Join-Path (Join-Path $addonsRoot $addonId) ($file.path -replace '/', '\')
              New-Item -ItemType Directory -Force -Path (Split-Path $outFile) | Out-Null
              Invoke-WebRequest -Uri $file.url -OutFile $outFile -TimeoutSec 60
              $downloaded++
            }
          }

          Write-Output "addons.json bundled: $(($r.addons.list | Measure-Object).Count) add-ons"
          Write-Output "Add-on files bundled: $downloaded"

      # ── Upload artifacts ─────────────────────────────────────────────────

      - name: Upload Sandboxie x64
        uses: actions/upload-artifact@v4
        with:
          name: Sandboxie_x64
          path: Installer/SbiePlus_x64/*
          retention-days: 30

      - name: Upload Assets
        uses: actions/upload-artifact@v4
        with:
          name: Assets
          path: Installer/Assets/*
          retention-days: 30
